name: Keep Streamlit App Alive

on:
  schedule:
    # Runs every 6 hours to prevent the app from sleeping (12h inactivity limit)
    - cron: "0 */6 * * *"
  workflow_dispatch: # Allow manual trigger from GitHub Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium

      - name: Ping and Wake Streamlit App
        run: |
          python -c "
          from playwright.sync_api import sync_playwright
          
          with sync_playwright() as p:
              browser = p.chromium.launch(headless=True)
              page = browser.new_page()
              print('Navigating to Streamlit app...')
              page.goto('https://bionium-x.streamlit.app/', wait_until='networkidle')
              
              wakeup_button = page.locator(\"button:has-text('Yes, get this app back up!')\")
              if wakeup_button.count() > 0:
                  print('App is sleeping. Clicking wake up button...')
                  wakeup_button.click()
                  page.wait_for_timeout(10000)
              else:
                  print('App is awake.')
              
              browser.close()
          "
