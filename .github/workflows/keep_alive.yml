name: Keep Streamlit App Alive

on:
  schedule:
    # Runs every 6 hours to prevent the app from sleeping (12h inactivity limit)
    - cron: "0 */6 * * *"
  workflow_dispatch: # Allow manual trigger from GitHub Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Streamlit App
        run: |
          HTTP_STATUS=$(curl -o /dev/null -s -w "%{http_code}" https://bionium-x.streamlit.app/)
          echo "HTTP Status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" -ne 200 ]; then
            echo "::warning::App responded with HTTP $HTTP_STATUS (expected 200)"
          fi
          echo "✅ Keep-alive ping sent at $(date -u)"
